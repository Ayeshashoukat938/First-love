<!DOCTYPE html>
<html>
<head>
  <title>Our Special Day 💖</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      overflow: hidden;
    }

    .card {
      background: white;
      width: 80%;
      max-width: 500px;
      margin: 100px auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h1 {
      color: #d63384;
      font-size: 40px;
    }

    p {
      font-size: 18px;
      color: #444;
    }

    #timer {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #222;
    }

    .decor {
      width: 120px;
      margin: 10px;
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 18px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% {transform: translateY(100vh) scale(1);}
      100% {transform: translateY(-10vh) scale(1.5);}
    }
  </style>
</head>

<body>

<div class="card">
  <!-- Teddy + Flower (online images) -->
  <img class="decor" src="https://cdn-icons-png.flaticon.com/512/3468/3468375.png">
  <img class="decor" src="https://cdn-icons-png.flaticon.com/512/616/616490.png">

  <h1>28 April 2022 (SATURDAY)💖</h1>
  <p>Aaj K din m ne Apko pehli Baar Msg kiya Tha BiLaL✨</p>

  <div id="timer"></div>
</div>

<script>
  const startDate = new Date("April 28, 2022 00:00:00").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = now - startDate;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);

    document.getElementById("timer").innerHTML =
      `💞 ${days} days ${hours} hours ${minutes} minutes together 💞`;
  }, 1000);

  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }

  setInterval(createHeart, 250);
</script>

</body>
</html>
